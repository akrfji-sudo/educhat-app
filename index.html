<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduChat - 学校⇔プランナー連携</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- ★外部CSSファイルの読み込み -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans text-gray-800">

    <!-- ログイン画面 -->
    <div id="login-screen" class="fixed inset-0 bg-slate-800 bg-opacity-95 z-50 flex items-center justify-center transition-opacity duration-300">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full text-center">
            <h1 class="text-3xl font-bold text-blue-600 mb-2"><i class="fa-solid fa-school"></i> EduChat</h1>
            <p class="text-gray-500 mb-8 text-sm">デモ版：ログインする役割を選択</p>
            <div class="space-y-4">
                <button onclick="login('teacher', 'TCH_001', '佐藤 健太')" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg flex justify-center items-center gap-2 shadow-md transition"><i class="fa-solid fa-chalkboard-user"></i> 先生としてログイン (佐藤)</button>
                <button onclick="login('planner', 'PLN_001', '鈴木 プランナー')" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg flex justify-center items-center gap-2 shadow-md transition"><i class="fa-solid fa-user-tie"></i> プランナーとしてログイン</button>
            </div>
        </div>
    </div>

    <!-- ヘッダー -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10">
        <div class="flex items-center gap-3"><i class="fa-solid fa-school text-2xl"></i><h1 class="text-xl font-bold">EduChat</h1></div>
        <div class="flex items-center gap-4">
            <div id="user-role-display" class="bg-blue-700 rounded-full px-4 py-1 text-sm font-medium flex items-center gap-2"></div>
            <button onclick="logout()" class="text-white hover:text-gray-200 text-sm underline"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- サイドバー -->
        <aside class="w-1/3 max-w-sm bg-white border-r border-gray-200 flex flex-col">
            <div class="p-3 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                <button onclick="loadInitialData()" class="text-gray-500 hover:text-blue-700 text-sm"><i class="fa-solid fa-rotate-right"></i> 更新</button>
                <button id="new-thread-btn" onclick="openNewThreadModal()" class="hidden text-white bg-green-500 hover:bg-green-600 px-3 py-1.5 rounded text-xs font-bold shadow transition"><i class="fa-solid fa-pen"></i> 新規相談</button>
            </div>
            <div class="p-2 border-b border-gray-200 bg-white">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-3 top-2 text-gray-400 text-sm"></i>
                    <input type="text" id="search-input" onkeyup="renderThreadList()" placeholder="キーワードで探す..." class="w-full bg-gray-100 border-none rounded-full pl-9 pr-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            
            <!-- ★ タブ切り替え（3つに増加） -->
            <div class="flex border-b border-gray-200 text-sm font-bold bg-white">
                <button id="tab-active" onclick="switchTab('active')" class="hidden flex-1 py-2 text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition truncate px-1">🔴 未完了</button>
                <button id="tab-my" onclick="switchTab('my')" class="flex-1 py-2 text-blue-600 border-b-2 border-blue-600 transition truncate px-1">💬 自分の相談</button>
                <button id="tab-public" onclick="switchTab('public')" class="flex-1 py-2 text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition truncate px-1">📖 みんなの事例</button>
            </div>
            
            <div id="thread-list" class="flex-1 overflow-y-auto no-scrollbar p-2"></div>
        </aside>

        <!-- メインエリア -->
        <section class="flex-1 flex flex-col bg-slate-50 relative">
            <div class="bg-white p-3 border-b border-gray-200 flex justify-between items-center shadow-sm z-10 h-[68px]">
                <div class="flex items-center gap-3 overflow-hidden">
                    <h3 id="current-thread-title" class="font-bold text-lg truncate">スレッドを選択してください</h3>
                    <select id="thread-status-select" onchange="changeThreadStatus(this.value)" class="hidden bg-gray-50 border border-gray-300 text-gray-700 text-xs rounded focus:ring-blue-500 focus:border-blue-500 p-1 font-bold shadow-sm cursor-pointer hover:bg-gray-100 transition">
                        <option value="未対応">未対応</option>
                        <option value="対応中">対応中</option>
                        <option value="完了">完了</option>
                    </select>
                </div>
                
                <div class="flex gap-2 items-center shrink-0">
                    <div id="view-toggle-btns" class="hidden bg-gray-100 rounded-lg p-1 text-xs font-bold mr-2">
                        <button id="btn-view-chat" onclick="switchViewMode('chat')" class="px-3 py-1 bg-white shadow rounded text-blue-600">チャット</button>
                        <button id="btn-view-qa" onclick="switchViewMode('qa')" class="px-3 py-1 text-gray-500 hover:text-gray-700">記事プレビュー</button>
                    </div>
                    <button id="ai-summary-btn" onclick="callGeminiSummary()" class="hidden bg-gradient-to-r from-purple-500 to-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:opacity-90 transition items-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> AIで要約
                    </button>
                </div>
            </div>
            
            <div id="main-chat-area" class="flex-1 flex flex-col h-full overflow-hidden">
                <div id="chat-timeline" class="flex-1 overflow-y-auto p-4 space-y-6"></div>
                <div class="bg-white p-4 border-t border-gray-200">
                    <div class="flex items-center gap-2 max-w-4xl mx-auto">
                        <input type="text" id="message-input" placeholder="メッセージを入力..." class="flex-1 bg-gray-100 border-none rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm disabled:opacity-50" onkeypress="if(event.key === 'Enter') sendRealMessage()" disabled>
                        <button onclick="sendRealMessage()" id="send-button" class="bg-blue-500 hover:bg-blue-600 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-md transition shrink-0 disabled:opacity-50" disabled><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>

            <div id="main-qa-area" class="hidden flex-1 overflow-y-auto p-8 bg-white justify-center">
                <div class="max-w-3xl w-full">
                    <div class="inline-block bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded mb-3"><i class="fa-solid fa-check-circle"></i> 解決済み事例</div>
                    <h2 id="qa-title" class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">タイトル</h2>
                    <div id="qa-content" class="text-gray-700 leading-relaxed text-sm space-y-4"></div>
                </div>
            </div>

            <!-- モーダル群 -->
            <div id="ai-modal" class="hidden absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"><div class="bg-white rounded-xl shadow-2xl p-6 w-[90%] max-w-lg"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-lg text-purple-700 flex items-center gap-2"><i class="fa-solid fa-wand-magic-sparkles"></i> AI事例要約</h3><button onclick="closeModal('ai-modal')" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button></div><div id="ai-content" class="bg-gray-50 p-4 rounded-lg border border-gray-200 text-sm text-gray-700 space-y-2 h-64 overflow-y-auto"></div><div class="mt-4 flex justify-end gap-2"><button onclick="closeModal('ai-modal')" class="px-4 py-2 text-sm font-bold text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">キャンセル</button><button id="save-summary-btn" onclick="saveAISummary()" class="hidden px-4 py-2 text-sm font-bold text-white bg-blue-500 rounded-lg hover:bg-blue-600 flex items-center gap-2"><i class="fa-solid fa-cloud-arrow-up"></i> 事例として保存・公開</button></div></div></div>
            <div id="edit-message-modal" class="hidden absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"><div class="bg-white rounded-xl shadow-2xl p-6 w-[90%] max-w-lg"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-lg text-blue-600 flex items-center gap-2"><i class="fa-solid fa-pen"></i> メッセージの修正</h3><button onclick="closeModal('edit-message-modal')" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button></div><div class="space-y-2"><p class="text-xs text-gray-500">※個人情報などをマスク・修正して保存できます。</p><input type="hidden" id="edit-message-id"><textarea id="edit-message-content" rows="6" class="w-full bg-gray-50 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea></div><div class="mt-6 flex justify-end gap-2"><button onclick="closeModal('edit-message-modal')" class="px-4 py-2 text-sm font-bold text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">キャンセル</button><button id="save-edit-btn" onclick="saveEditedMessage()" class="px-4 py-2 text-sm font-bold text-white bg-blue-500 rounded-lg hover:bg-blue-600 flex items-center gap-2"><i class="fa-solid fa-save"></i> 修正を保存</button></div></div></div>
            <div id="new-thread-modal" class="hidden absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"><div class="bg-white rounded-xl shadow-2xl p-6 w-[90%] max-w-lg"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-lg text-green-600 flex items-center gap-2"><i class="fa-solid fa-comment-medical"></i> 新しい相談を作成</h3><button onclick="closeModal('new-thread-modal')" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button></div><div class="space-y-4"><div><label class="block text-sm font-bold text-gray-700 mb-1">相談のタイトル</label><input type="text" id="new-thread-title" onkeyup="checkSuggests()" placeholder="例: プロジェクターの接続について" class="w-full bg-gray-50 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"><div id="suggest-area" class="hidden mt-2 border border-blue-200 bg-blue-50 rounded-lg p-2 text-sm max-h-32 overflow-y-auto shadow-inner animate-[fadeIn_0.3s_ease-out]"><div class="text-blue-700 font-bold mb-1 text-xs"><i class="fa-solid fa-lightbulb text-yellow-500"></i> もしかして、こちらで解決しませんか？</div><ul id="suggest-list" class="space-y-1"></ul></div></div><div><label class="block text-sm font-bold text-gray-700 mb-1">最初のメッセージ（詳細）</label><textarea id="new-thread-message" rows="4" placeholder="状況を詳しく教えてください..." class="w-full bg-gray-50 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"></textarea></div></div><div class="mt-6 flex justify-end gap-2"><button onclick="closeModal('new-thread-modal')" class="px-4 py-2 text-sm font-bold text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">キャンセル</button><button id="create-thread-submit-btn" onclick="createNewThread()" class="px-4 py-2 text-sm font-bold text-white bg-green-500 rounded-lg hover:bg-green-600 flex items-center gap-2"><i class="fa-solid fa-paper-plane"></i> 送信する</button></div></div></div>
        </section>
    </main>

    <!-- ★外部JavaScriptファイルの読み込み -->
    <script src="main.js"></script>
</body>
</html>
